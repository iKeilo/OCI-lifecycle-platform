services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oci_lifecycle
      POSTGRES_USER: oci_lifecycle
      POSTGRES_PASSWORD: oci_lifecycle
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oci_lifecycle -d oci_lifecycle"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
