services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GO_PROXY: ${GO_PROXY:-}
    image: ${OCI_LIFECYCLE_IMAGE:-oci-lifecycle-platform:local}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-18080}:8080"
    environment:
      PORT: "8080"
      STATIC_DIR: /app/www
      PROFILE_STORE_FILE: /data/profiles.json
      OCI_EXECUTION_MODE: ${OCI_EXECUTION_MODE:-oci}
      PANEL_PASSWORD_HASH: ${PANEL_PASSWORD_HASH:-}
      PANEL_SESSION_SECRET: ${PANEL_SESSION_SECRET:-}
      PROFILE_KEY_ENCRYPTION_KEY: ${PROFILE_KEY_ENCRYPTION_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-}
      OCI_TENANCY_OCID: ${OCI_TENANCY_OCID:-}
      OCI_USER_OCID: ${OCI_USER_OCID:-}
      OCI_FINGERPRINT: ${OCI_FINGERPRINT:-}
      OCI_PRIVATE_KEY_PATH: ${OCI_PRIVATE_KEY_PATH:-}
      OCI_REGION: ${OCI_REGION:-}
      OCI_COMPARTMENT_OCID: ${OCI_COMPARTMENT_OCID:-}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - oci-profile-data:/data
      - ${OCI_KEY_DIR:-./docker/keys}:/keys:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    profiles: ["postgres"]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oci_lifecycle}
      POSTGRES_USER: ${POSTGRES_USER:-oci_lifecycle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-before-production}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oci_lifecycle} -d ${POSTGRES_DB:-oci_lifecycle}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  oci-profile-data:
    name: ${PROFILE_DATA_VOLUME:-oci-lifecycle-platform-profile-data}
  postgres-data:
    name: ${POSTGRES_DATA_VOLUME:-oci-lifecycle-platform-postgres-data}
