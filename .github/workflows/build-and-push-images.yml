name: Build and Push Images

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag and optional release tag, for example 1.0.0"
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/ikeilo/oci-lifecycle-platform

jobs:
  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=tag
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=OCI Lifecycle Platform
            org.opencontainers.image.description=Oracle Cloud Infrastructure machine lifecycle control panel
            org.opencontainers.image.source=https://github.com/iKeilo/OCI-lifecycle-platform
            org.opencontainers.image.licenses=GPL-3.0

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            panel_install.sh
            panel_linux_install.sh
            docker-compose.yml
            docker/.env.example
            docs/one-click-install.md
            docs/docker-install.md

